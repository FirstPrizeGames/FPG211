<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 · Personal Profile</title>
    <script>
      (() => {
        const savedTheme = localStorage.getItem("profile-theme");
        const prefersDark = matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme =
          savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.lang =
          localStorage.getItem("profile-language") || "ko";
        document.documentElement.dataset.accent =
          localStorage.getItem("profile-accent") || "neutral";
        if (localStorage.getItem("profile-fast-render") === "true") {
          document.documentElement.dataset.fastRender = "true";
        }
      })();
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="loading-bar" aria-hidden="true"></div>
    <div class="scroll-progress" aria-hidden="true"></div>
    <main class="shell">
      <nav class="topbar" aria-label="오류 페이지 메뉴">
        <div class="nav-links">
          <a href="/#about" data-i18n="nav.about">About</a>
          <a href="/#work" data-i18n="nav.work">Work</a>
          <a href="/#contact" data-i18n="nav.contact">Contact</a>
          <a href="/Pricing" data-i18n="nav.pricing">Pricing</a>
          <a href="/settings" data-i18n="nav.settings">Settings</a>
        </div>
      </nav>

      <section class="error-page" aria-labelledby="error-title">
        <p class="eyebrow" data-i18n="error.eyebrow">404</p>
        <p class="error-code" data-i18n="error.code">404_NOT_FOUND</p>
        <h1 id="error-title" data-i18n="error.title">페이지를 찾을 수 없습니다.</h1>
        <p data-i18n="error.body">
          요청한 주소가 변경되었거나 아직 준비되지 않은 페이지일 수 있습니다.
        </p>
        <div class="actions">
          <a class="button primary" href="/" data-i18n="error.home">홈으로 이동</a>
          <a class="button ghost" href="/settings" data-i18n="error.settings">설정 열기</a>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
