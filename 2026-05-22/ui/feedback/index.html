    <script>
      (() => {
        const savedTheme = localStorage.getItem("profile-theme");
        const prefersDark = matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme =
          savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.lang =
          localStorage.getItem("profile-language") || "en";
        document.documentElement.dataset.accent =
          localStorage.getItem("profile-accent") || "neutral";
        document.documentElement.dataset.density =
          localStorage.getItem("profile-density") || "comfortable";
        if (
          localStorage.getItem("profile-fast-render") === "true" ||
          localStorage.getItem("profile-setting-fast-render") === "true"
        ) {
          document.documentElement.dataset.fastRender = "true";
        }
        if (localStorage.getItem("profile-setting-kid-mode") === "true") {
          document.documentElement.dataset.kidMode = "true";
        }
      })();
    </script>
    <link rel="stylesheet" href="../styles.css?v=20260530-bluesky-share" />

          <span aria-hidden="true">↗</span>

          <div class="cache-warning-actions">

            <button class="button feedback-confirm-button" type="button" data-feedback-confirm data-i18n="feedback.continue">
