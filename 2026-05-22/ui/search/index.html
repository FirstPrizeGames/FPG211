    <script>
      (() => {
        const normalizeTheme = (theme) => {
          if (["dark", "lights-off"].includes(theme)) return theme;
          if (theme === "light") return "dark";
          if (["dim", "dark-mode", "true"].includes(theme)) return "dark";
          if (["lightsout", "lights-out", "black", "off"].includes(theme)) return "lights-off";
          return "";
        };
        const normalizeBoolean = (value, fallback = false) => {
          if ([true, "true", "1", "on"].includes(value)) return true;
          if ([false, "false", "0", "off"].includes(value)) return false;
          return fallback;
        };
        const normalizeKidMode = (mode) => {
          if (mode === "true") return "strong";
          return ["soft", "strong"].includes(mode) ? mode : "off";
        };
        const savedTheme = normalizeTheme(localStorage.getItem("profile-theme"));
        document.documentElement.dataset.theme = savedTheme || "dark";
        const savedLanguagePreference = ["auto", "ko", "en"].includes(localStorage.getItem("profile-language")) ? localStorage.getItem("profile-language") : "auto";
        const browserLanguage = (((navigator.languages || [navigator.language]) || [])
          .map((language) => String(language || "").toLowerCase())
          .find((language) => language.startsWith("ko") || language.startsWith("en")) || "ko").startsWith("en") ? "en" : "ko";
        document.documentElement.lang = savedLanguagePreference === "auto" ? browserLanguage : savedLanguagePreference;
        document.documentElement.dataset.initialLanguage = document.documentElement.lang;
        document.documentElement.dataset.kidMode = normalizeKidMode(localStorage.getItem("profile-setting-kid-mode"));
        document.documentElement.dataset.navLayout = "sidebar";
        document.documentElement.dataset.sidebarCollapsed = normalizeBoolean(localStorage.getItem("profile-sidebar-collapsed"), false)
          ? "true"
          : "false";
      })();
    </script>
