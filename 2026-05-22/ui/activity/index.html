    <script>
      (() => {
        const normalizeTheme = (theme) => {
          if (["dark", "lights-off"].includes(theme)) return theme;
          if (theme === "light") return "dark";
          if (["dim", "dark-mode", "true"].includes(theme)) return "dark";
          if (["lightsout", "lights-out", "black", "off"].includes(theme)) return "lights-off";
          return "";
        };
        const normalizeBoolean = (value, fallback = false) => {
          if ([true, "true", "1", "on"].includes(value)) return true;
          if ([false, "false", "0", "off"].includes(value)) return false;
          return fallback;
        };
        const normalizeKidMode = (mode) => {
          if (mode === "true") return "strong";
          return ["soft", "strong"].includes(mode) ? mode : "off";
        };
        const normalizeAccent = (accent) =>
          ["blue", "green", "rose", "orange", "purple"].includes(accent) ? accent : "neutral";
        const savedTheme = normalizeTheme(localStorage.getItem("profile-theme"));
        document.documentElement.dataset.theme = savedTheme || "dark";
        document.documentElement.lang = ["ko", "en"].includes(localStorage.getItem("profile-language"))
          ? localStorage.getItem("profile-language")
          : "en";
        document.documentElement.dataset.accent = normalizeAccent(localStorage.getItem("profile-accent"));
        document.documentElement.dataset.density = ["compact", "comfortable", "spacious"].includes(localStorage.getItem("profile-density"))
          ? localStorage.getItem("profile-density")
          : "comfortable";
        document.documentElement.dataset.fastRender = normalizeBoolean(
          localStorage.getItem("profile-setting-fast-render") || localStorage.getItem("profile-fast-render"),
          false,
        )
          ? "true"
          : "false";
        document.documentElement.dataset.kidMode = normalizeKidMode(localStorage.getItem("profile-setting-kid-mode"));
        const sidebarNavEnabled = normalizeBoolean(localStorage.getItem("profile-setting-sidebar-nav"), true);
        document.documentElement.dataset.navLayout = sidebarNavEnabled ? "sidebar" : "top";
        document.documentElement.dataset.sidebarCollapsed = sidebarNavEnabled && normalizeBoolean(
          localStorage.getItem("profile-sidebar-collapsed"),
          false,
        )
          ? "true"
          : "false";
      })();
    </script>
